name: Release

# Publishes the Puzzle npm packages on a version tag (e.g. v0.1.0):
#   - four per-platform CLI binary packages (@magic-spells/puzzle-<os>-<arch>)
#   - the root @magic-spells/puzzle package (runtime + bin shim)
# The root is published LAST so its optionalDependencies already exist on npm.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Assert tag matches package.json and version.go
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::tag version ($VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi
          GO_VERSION="$(sed -n 's/^var Version = "\(.*\)"$/\1/p' compiler/internal/version/version.go)"
          if [ "$GO_VERSION" != "$VERSION" ]; then
            echo "::error::tag version ($VERSION) != version.go Version ($GO_VERSION)"
            exit 1
          fi
          for pkg in npm/puzzle-*/package.json; do
            PLAT_VERSION="$(node -p "require('./$pkg').version")"
            if [ "$PLAT_VERSION" != "$VERSION" ]; then
              echo "::error::tag version ($VERSION) != $pkg version ($PLAT_VERSION)"
              exit 1
            fi
          done
          echo "Version $VERSION verified against package.json, version.go, and platform manifests."

      - name: Verify pack contents
        run: node scripts/verify-pack.mjs

      - name: Cross-compile CLI binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/magic-spells/puzzle/compiler/internal/version.Version=${VERSION}"
          build() {
            local goos="$1" goarch="$2" pkg="$3"
            echo "Building $pkg ($goos/$goarch)"
            mkdir -p "npm/$pkg/bin"
            GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath -ldflags "$LDFLAGS" \
              -o "npm/$pkg/bin/puzzle" ./compiler/cmd/puzzle
            chmod +x "npm/$pkg/bin/puzzle"
          }
          build darwin arm64 puzzle-darwin-arm64
          build darwin amd64  puzzle-darwin-x64
          build linux  amd64  puzzle-linux-x64
          build linux  arm64  puzzle-linux-arm64

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in puzzle-darwin-arm64 puzzle-darwin-x64 puzzle-linux-x64 puzzle-linux-arm64; do
            echo "Publishing @magic-spells/$pkg"
            npm publish "npm/$pkg" --access public
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: npm publish --access public

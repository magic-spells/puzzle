<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#fbfaf8">
  <title>Puzzle Field Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>
  <!-- Empty '#id' mount element (required by static/hybrid builds, D79/D67). In
       static mode `puzzle build --static` injects each route's markup here and
       stamps it data-puzzle-static, then swaps this /app.js tag for a small
       per-page module — dist/ ships no app.js. -->
  <div id="app"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
